name: jade_app
description: "Jade personal assistant app for JamesOS."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  flutter_markdown: ^0.7.7+1
  flutter_tts: ^4.2.5
  speech_to_text: ^7.4.0
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/jade_launcher.png
  adaptive_icon_background: "#07110f"
  adaptive_icon_foreground: assets/icon/jade_launcher.png
