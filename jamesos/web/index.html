<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Jade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#111827; color:#f9fafb; }
    header { padding:14px 16px; background:#1f2937; font-size:20px; font-weight:700; }
    main { max-width:900px; margin:0 auto; padding:16px; }
    #chat { display:flex; flex-direction:column; gap:12px; padding-bottom:90px; }
    .msg { padding:14px 16px; border-radius:14px; white-space:normal; line-height:1.55; font-size:16px; }
    .msg p { margin:0 0 10px 0; }
    .msg p:last-child { margin-bottom:0; }
    .msg ul, .msg ol { margin:8px 0 8px 22px; padding:0; }
    .msg li { margin:5px 0; }
    .msg h1, .msg h2, .msg h3 { margin:8px 0; line-height:1.25; }
    .msg code { background:#111827; padding:2px 5px; border-radius:5px; }
    .msg pre { background:#111827; padding:12px; border-radius:10px; overflow:auto; }
    .msg a { color:#93c5fd; }
    .user { background:#2563eb; align-self:flex-end; max-width:80%; }
    .jade { background:#374151; align-self:flex-start; max-width:90%; }
    form { position:fixed; bottom:0; left:0; right:0; background:#1f2937; padding:12px; display:flex; gap:8px; }
    input { flex:1; border-radius:10px; border:0; padding:12px; font-size:16px; }
    button { border:0; border-radius:10px; padding:0 16px; font-size:16px; font-weight:700; background:#10b981; color:#052e1b; }
    #pairBox { max-width:700px; margin:24px auto; background:#1f2937; border:1px solid #374151; border-radius:14px; padding:16px; }
    #app { display:none; }
    .muted { color:#9ca3af; font-size:14px; }
  </style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>Jade · JamesOS</header>

  <main>
    <div id="pairBox">
      <h2>Pair this device with Jade</h2>
      <p class="muted">Paste the JamesOS key once. It will be saved on this device and hidden after pairing.</p>
      <input id="key" type="password" placeholder="Pairing key" />
      <button onclick="pairDevice()" type="button">Pair</button>
      <p id="pairStatus" class="muted"></p>
    </div>

    <div id="app">
      <div id="chat"></div>
    </div>
  </main>

  <form id="form">
    <input id="file" type="file" style="display:none" onchange="uploadFile()" />
    <button type="button" onclick="document.getElementById('file').click()">+</button>
    <input id="q" autocomplete="off" placeholder="Ask Jade..." />
    <button>Send</button>
  </form>

<script>
const chat = document.getElementById("chat");
const pairBox = document.getElementById("pairBox");
const app = document.getElementById("app");
const keyInput = document.getElementById("key");
const pairStatus = document.getElementById("pairStatus");

function getKey() {
  return localStorage.getItem("jamesos_key") || "";
}

async function showApp() {
  pairBox.style.display = "none";
  app.style.display = "block";
  chat.innerHTML = "";

  try {
    const res = await fetch("/chat/history", {
      headers: { "X-JamesOS-Key": getKey() }
    });
    const data = await res.json();

    if (data.messages && data.messages.length) {
      for (const item of data.messages.slice(-30)) {
        add("user", item.question);
        add("jade", item.answer);
      }
    } else {
      add("jade", "Hi James. Jade is ready.");
    }
  } catch (err) {
    add("jade", "Hi James. Jade is ready.");
  }
}

function add(who, text) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  if (who === "jade" && window.marked) {
    div.innerHTML = marked.parse(text);
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

async function pairDevice() {
  const candidate = keyInput.value.trim();
  if (!candidate) return;

  pairStatus.textContent = "Checking key...";

  try {
    const res = await fetch("/mobile/home", {
      headers: { "X-JamesOS-Key": candidate }
    });

    if (!res.ok) {
      pairStatus.textContent = "Pairing failed. Check the key.";
      return;
    }

    localStorage.setItem("jamesos_key", candidate);
    keyInput.value = "";
    pairStatus.textContent = "";
    showApp();
  } catch (err) {
    pairStatus.textContent = "Pairing error: " + err;
  }
}

async function uploadFile() {
  const input = document.getElementById("file");
  if (!input.files.length) return;

  const file = input.files[0];
  const form = new FormData();
  form.append("file", file);

  add("user", "Upload: " + file.name);
  add("jade", "Uploading...");

  try {
    const res = await fetch("/upload", {
      method: "POST",
      headers: {
        "X-JamesOS-Key": getKey()
      },
      body: form
    });

    const data = await res.json();
    chat.lastChild.textContent = data.status
      ? "Uploaded: " + data.filename
      : JSON.stringify(data, null, 2);
  } catch (err) {
    chat.lastChild.textContent = "Upload error: " + err;
  }

  input.value = "";
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const questionBox = document.getElementById("q");
  const question = questionBox.value.trim();
  if (!question) return;

  if (!getKey()) {
    pairStatus.textContent = "Pair this device first.";
    return;
  }

  questionBox.value = "";
  add("user", question);
  add("jade", "Thinking...");

  try {
    const res = await fetch("/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-JamesOS-Key": getKey()
      },
      body: JSON.stringify({ question, use_ai: true })
    });

    const data = await res.json();
    if (window.marked) {
      chat.lastChild.innerHTML = marked.parse(data.answer || JSON.stringify(data, null, 2));
    } else {
      chat.lastChild.textContent = data.answer || JSON.stringify(data, null, 2);
    }
  } catch (err) {
    chat.lastChild.textContent = "Error: " + err;
  }
});

if (getKey()) {
  showApp();
}
</script>
</body>
</html>
